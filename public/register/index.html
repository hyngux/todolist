<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0a84ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>hyx | Register</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icons/hogrider.png">
    <link rel="icon" type="image/png" href="/icons/hogrider.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
    <div class="auth-shell">
        <div class="auth-card">
            <div class="logo auth-logo">hyx</div>
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-sub">Sign up</p>

            <form id="register-form" class="auth-form">
                <label class="auth-label">Username</label>
                <input type="text" name="username" class="input-minimal" placeholder="Nome" required>

                <label class="auth-label">Email</label>
                <input type="email" name="email" class="input-minimal" placeholder="teu@email.com" required>

                <label class="auth-label">Password</label>
                <input type="password" name="password" class="input-minimal" placeholder="Min 8 caracteres" minlength="8" required>

                <button type="submit" class="btn-submit auth-submit">Create Account</button>
                <div class="auth-error" id="register-error"></div>
            </form>

            <div class="auth-footer">
                <span>Já tens conta?</span>
                <a href="/login">Try to login</a>
            </div>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
